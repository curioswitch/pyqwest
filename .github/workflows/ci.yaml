name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-progress jobs for PRs only
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04
          - windows-2025
        python:
          - "3.10"
          - "3.14"
        # Test oldest and newest on all OS's, but others only on one
        # to save CI load.
        include:
          - os: ubuntu-24.04
            python: "3.11"
          - os: ubuntu-24.04
            python: "3.12"
          - os: ubuntu-24.04
            python: "3.13"
          - os: ubuntu-24.04
            python: "3.14t"
          # Enable coverage on just one job
          - os: ubuntu-24.04
            python: "3.14"
            coverage: "cov"

    env:
      # Avoid multiple compile e.g. in lint and test by setting as a job env var
      RUSTFLAGS: "--cfg reqwest_unstable --cfg tokio_unstable ${{ matrix.coverage == 'cov' && '-C instrument-coverage' || '' }}"
      MATURIN_DEVELOP_ARGS: ${{ (matrix.python == '3.10' || matrix.python == '3.11') && '--features pyo3/abi3-py310' || '' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Setup rust
        run: |
          rustup update
          ${{ matrix.coverage == 'cov' && 'rustup component add llvm-tools' || '' }}

      - run: uv lock --check

      - run: uv sync --python ${{ matrix.python }}

      # Go ahead and run lint on all Python versions since we may have version-specific
      # guards in rust in the future.
      - name: run lints
        if: startsWith(matrix.os, 'ubuntu-')
        run: uv run poe lint

      - name: run tests
        run: uv run poe test ${{ matrix.coverage == 'cov' && '--cov=pyqwest --cov-report=xml' || '' }}

      # Needed for connect integration tests runner
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: github.event_name == 'push' && matrix.python != '3.14t' && !startsWith(matrix.os, 'windows-')
        with:
          go-version: stable

      - name: run connect integration tests on push
        if: github.event_name == 'push' && matrix.python != '3.14t' && !startsWith(matrix.os, 'windows-')
        run: uv run poe integration-test-connect

      - name: verify wheel build
        run: uv run poe wheel

      - name: prepare coverage
        if: ${{ matrix.coverage == 'cov' }}
        run: |
          $(rustc --print=target-libdir)/../bin/llvm-profdata merge -sparse default_*.profraw -o tests.profdata
          $(rustc --print=target-libdir)/../bin/llvm-cov export -format=lcov --ignore-filename-regex='/.cargo/registry' --ignore-filename-regex='.cargo/git/checkouts' --ignore-filename-regex='.rustup/toolchains' -instr-profile tests.profdata pyqwest/_pyqwest.*.so > tests.lcov

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ matrix.coverage == 'cov' }}
