[project]
site_name = "pyqwest"
site_url = "https://curioswitch.github.io/pyqwest/"
site_description = "A Python HTTP client built on top of reqwest"
site_author = "CurioSwitch"
copyright = "&copy; CurioSwitch"
repo_name = "pyqwest"
repo_url = "https://github.com/curioswitch/pyqwest"
edit_uri = "edit/main/docs/"
nav = [
  { "Home" = "index.md" },
  { "Usage" = "usage.md" },
  { "Reference" = [
    "reference/index.md",
    { "Async Client" = "reference/async.md" },
    { "Sync Client" = "reference/sync.md" },
    { "Common" = "reference/common.md" },
    { "Testing" = "reference/testing.md" },
    { "HTTPX Adapters" = "reference/httpx.md" },
  ] },
]

[project.theme]
favicon = "img/favicon.png"
logo = "img/logo.png"
features = [
  "content.action.edit",
  "content.code.copy",
  "content.tabs.link",
  "navigation.expand",
  "navigation.indexes",
  "navigation.top",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["."]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_options = { ignore_init_summary = true }
docstring_style = "google"
allow_inspection = false
inherited_members = false
members_order = "source"
merge_init_into_class = true
show_root_heading = true
show_signature = false
show_source = false
